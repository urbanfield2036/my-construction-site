<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>(주)대상종합건설</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
font-family:'Noto Sans KR',sans-serif;
margin:0;
}

html{
scroll-behavior:smooth;
}

.fade-slide{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
opacity:0;
transition:opacity 1.2s;
}

.fade-slide.active{
opacity:1;
z-index:1;
}

nav{
transition:all .3s;
}

.nav-scrolled{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(6px);
}

</style>

</head>

<body>

<!-- NAVIGATION -->

<nav id="navbar" class="fixed top-0 w-full z-50">

<div class="max-w-7xl mx-auto px-6">

<div class="flex justify-between h-16 items-center">

<div id="logo" class="text-xl font-bold text-white">
(주)대상종합건설
</div>

<div class="hidden md:flex space-x-8 text-white text-sm font-semibold">

<a href="#home">HOME</a>
<a href="#company">COMPANY</a>
<a href="#works">WORKS</a>
<a href="#contact">CONTACT</a>

</div>

</div>
</div>

</nav>


<!-- HERO -->

<section id="home" class="relative w-full h-screen overflow-hidden">

<div class="absolute inset-0">

<div class="fade-slide active">
<img src="./01.image/main-bg-01.jpg" class="w-full h-full object-cover">
</div>

<div class="fade-slide">
<img src="./01.image/main-bg-02.jpg" class="w-full h-full object-cover">
</div>

<div class="fade-slide">
<img src="./01.image/main-bg-03.jpg" class="w-full h-full object-cover">
</div>

<div class="fade-slide">
<img src="./01.image/main-bg-04.jpg" class="w-full h-full object-cover">
</div>

</div>

<div class="absolute inset-0 bg-black/25"></div>

<div class="absolute inset-0 flex items-center justify-center text-center text-white px-6">

<div>

<h1 class="text-3xl md:text-5xl font-light leading-tight">

Real value begins with<br>
reasonable decisions

</h1>

</div>

</div>

</section>


<!-- COMPANY -->

<section id="company" class="py-24 max-w-4xl mx-auto px-6">

<h2 class="text-3xl font-bold mb-10">

COMPANY

</h2>

<p class="text-gray-600 leading-relaxed">

우리는 모든 건물이 누군가의 가치에서 시작된다고 생각합니다.

하나의 건물 뒤에는 오랜 시간의 노력과 투자, 그리고 소중한 자산이 담겨 있습니다.

우리가 짓는 것은 단순한 콘크리트와 철골이 아니라 고객이 쌓아온 가치입니다.

</p>

</section>


<!-- WORKS -->

<section id="works" class="py-24 bg-gray-50">

<div class="max-w-7xl mx-auto px-6">

<h2 class="text-3xl font-bold mb-12">

WORKS

</h2>

<div class="grid md:grid-cols-3 gap-6">

<div class="overflow-hidden">

<img src="https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&w=800"
class="w-full h-[260px] object-cover">

</div>

<div class="overflow-hidden">

<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=800"
class="w-full h-[260px] object-cover">

<div class="overflow-hidden">

</div>

</div>

<!-- CONTACT -->

<section id="contact" class="py-24">

<div class="max-w-5xl mx-auto px-6">

<h2 class="text-3xl font-bold mb-10">

CONTACT

</h2>

<p class="text-lg">
서울특별시 ○○구 ○○로 123
</p>

<p class="mt-4">
T. 02-123-4567
</p>

</div>

</section>


<script>

const nav=document.getElementById("navbar");
const logo=document.getElementById("logo");

window.addEventListener("scroll",()=>{

if(window.scrollY>80){

nav.classList.add("nav-scrolled");

nav.querySelectorAll("a").forEach(el=>{
el.style.color="#111";
});

logo.style.color="#111";

}else{

nav.classList.remove("nav-scrolled");

nav.querySelectorAll("a").forEach(el=>{
el.style.color="white";
});

logo.style.color="white";

}

});


let slideIndex=0;

const slides=document.querySelectorAll(".fade-slide");

function showSlides(){

slides.forEach(s=>s.classList.remove("active"));

slideIndex++;

if(slideIndex>slides.length){
slideIndex=1;
}

slides[slideIndex-1].classList.add("active");

setTimeout(showSlides,5000);

}

showSlides();

</script>

</body>

</html>
